# general settings # base arch without using the noisy input
# name: CLIPDenoising_SyntheticDenoising_GaussianSigma15 # ORIGINAL
name: CLIPDenoising_SyntheticDenoising_GaussianSigma15
model_type: ImageCleanModel
scale: 1
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 100

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: Dataset_GaussianDenoising
    sigma_type: constant
    sigma_range: 15
    in_ch: 3    ## RGB image
    dataroot_gt: /kaggle/input/datasets/tzyee03/bsd-dataset/bsd-dataset/CBSD432
    dataroot_lq: none
    geometric_augs: true

    filename_tmpl: '{}'
    io_backend:
      type: disk

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 2   # ORIGINAL: 8
    batch_size_per_gpu: 4   # ORIGINAL: 16

    mini_batch_sizes: [4]   # ORIGINAL: 16 
    iters: [10000]           # ORIGINAL: 300000
    gt_size: 64             # ORIGINAL: 128
    gt_sizes: [64]          # ORIGINAL: 128

    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet
    type: Dataset_GaussianDenoising
    sigma_type: constant
    sigma_test: 50
    in_ch: 3  ## RGB image
    dataroot_gt: /kaggle/input/datasets/tzyee03/bsd-dataset/bsd-dataset/CBSD68
    dataroot_lq: none
    io_backend:
      type: disk

# network structures
network_g:
  type: CLIPDenoising
  inp_channels: 3
  out_channels: 3
  depth: 5
  wf: 64 
  num_blocks: [3, 4, 6, 3] 
  bias: false
  model_path: /kaggle/working/RN50.pt

  aug_level: 0.025

# path (ORIGINAL)
# path:
#   pretrain_network_g: ~
#   strict_load_g: true
#   resume_state: ~

path:
  root: /kaggle/working/denoising-project
  experiments_root: /kaggle/working/denoising-project/experiments/CLIPDenoising_SyntheticDenoising_GaussianSigma15
  models: /kaggle/working/denoising-project/experiments/CLIPDenoising_SyntheticDenoising_GaussianSigma15/models
  training_states: /kaggle/working/denoising-project/experiments/CLIPDenoising_SyntheticDenoising_GaussianSigma15/training_states
  log: /kaggle/working/denoising-project/experiments/CLIPDenoising_SyntheticDenoising_GaussianSigma15
  visualization: /kaggle/working/denoising-project/experiments/CLIPDenoising_SyntheticDenoising_GaussianSigma15/visualization
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: ~

# training settings
train:
  total_iter: 10000      # ORIGINAL: 300000
  warmup_iter: -1 # no warm up
  use_grad_clip: true

  scheduler:
    type: CosineAnnealingRestartCyclicLR
    periods: [3000, 7000]    # ORIGINAL: [92000, 208000]    
    restart_weights: [1,1]
    eta_mins: [0.0003,0.000001]   
  
  mixing_augs:
    mixup: false  # ORIGINAL: true
    mixup_beta: 1.2
    use_identity: true

  optim_g:
    type: AdamW
    lr: !!float 3e-4
    weight_decay: !!float 1e-4
    betas: [0.9, 0.999]
  
  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1
    reduction: mean

# validation settings
val:
  window_size: 32
  val_freq: 1000    # ORIGINAL: !!float 4e3
  save_img: false
  rgb2bgr: true
  use_image: false
  max_minibatch: 8

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 50 # ORIGINAL: 1000
  save_checkpoint_freq: 1000 # ORIGINAL: !!float 1e5
  use_tb_logger: false
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
